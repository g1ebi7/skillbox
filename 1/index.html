<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="/style.css" />
  </head>

  <body>
    <button class="scroll-btn">Go up!</button>
    <button class="modal-btn">Click me!</button>
    <div class="modal">
      Hello! Please click somewhere outside the red box to close it
    </div>

    <form
      action="submit"
      class="form">
      <input
        type="text"
        placeholder="Имя"
        class="name-input" />
      <input
        type="text"
        placeholder="Фамилия"
        class="surname-input" />
      <input
        type="text"
        placeholder="Отчество"
        class="secondname-input" />
      <button class="form-btn">Send</button>
    </form>
    <div class="client-info-wrapper"></div>
    <div class="content"></div>

    <script src="main.js"></script>
  </body>
</html>
